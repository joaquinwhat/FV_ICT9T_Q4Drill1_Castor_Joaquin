<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
</head>
<body>

    <h1>Electricity Consumption Classifier</h1>

    <input type="text" class="form-control" id="consumption" placeholder="Enter electricity consumption in kWh">
    <button onclick="classifyConsumption()">Classify</button>

    <script>
        function classifyConsumption() {
            var kWh = document.getElementById("consumption").value;
            let cat1 = "Lifeline Consumer";
            let cat2 = "Low Consumption Consumer";
            let cat3 = "Average Consumer";
            let cat4 = "High Consumption Consumer";
            let cat5 = "Very High Consumption Consumer";
             if (isNaN(kWh) || kWh < 0) {
                alert("Please enter a valid number for electricity consumption.");
        }
            else if (kWh <= 100) {
                alert("Discounted Electricity Rates, the consumer is classified as: " + cat1);
        }

            else if (kWh > 100 && kWh <= 200) {
                alert("Normal Residential Rate, the consumer is classified as: " + cat2);
        }
            else if (kWh > 200 && kWh <= 500) {
                alert("Typical electricity usage, the consumer is classified as: " + cat3);
        }
            else if (kWh > 500 && kWh <= 1000) {
                alert("Higher electricity usage, the consumer is classified as: " + cat4);
        }
            else if (kWh > 1000) {
                alert("Heavy electricity usage, the consumer is classified as: " + cat5);
        }

            else {
                alert("Invalid input. Please enter a valid number for electricity consumption.");
            }
        } 
        
    </script>
    
</body>
</html>
