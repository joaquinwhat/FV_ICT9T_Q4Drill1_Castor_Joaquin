<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
</head>
<body>

    <h1>Electricity Consumption Classifier</h1>

    <input type="text" class="form-control" id="consumption" placeholder="Enter electricity consumption in kWh">
    <button onclick="classifyConsumption()">Classify</button>

    <script>
        function classifyConsumption() {
            const consumptionInput = document.getElementById('consumption');
            const consumption = parseFloat(consumptionInput.value);

            if (isNaN(consumption) || consumption < 0) {
                alert('Please enter a valid non-negative number for electricity consumption.');
                return;
            }

            let classification;

            if (consumption < 100) {
                classification = 'Low';
            } else if (consumption >= 100 && consumption < 500) {
                classification = 'Medium';
            } else {
                classification = 'High';
            }

            alert(`The electricity consumption of ${consumption} kWh is classified as: ${classification}`);
        }
    </script>
    
</body>
</html>
